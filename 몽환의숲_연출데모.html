<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>몽환의 숲</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d1117;
    --ink2:#121a24;
    --mist:#1c2733;
    --moon:#e8e4d8;
    --moon-dim:#9fa9ad;
    --gold:#c9b079;
    --gold-dim:#8a7c54;
    --water:#3a5a6b;
    --text:#d4d8d4;
    --text-dim:#7d8891;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}
  body{
    background:radial-gradient(ellipse at 50% 30%, #16202c 0%, #0d1117 70%, #080b0f 100%);
    font-family:'Nanum Myeongjo',serif;
    color:var(--text);
    height:100vh;
    width:100%;
    position:relative;
    -webkit-font-smoothing:antialiased;
  }

  /* ── ambient mist layers ── */
  .mist-layer{
    position:fixed; inset:-20%;
    background:radial-gradient(ellipse 60% 40% at 30% 40%, rgba(58,90,107,0.12), transparent 60%),
               radial-gradient(ellipse 50% 50% at 70% 60%, rgba(40,55,70,0.15), transparent 55%);
    pointer-events:none; z-index:1;
    animation:drift 28s ease-in-out infinite alternate;
  }
  .mist-layer.b{
    background:radial-gradient(ellipse 55% 45% at 60% 30%, rgba(70,85,95,0.10), transparent 60%),
               radial-gradient(ellipse 45% 55% at 25% 70%, rgba(45,65,80,0.12), transparent 55%);
    animation:drift2 36s ease-in-out infinite alternate;
  }
  @keyframes drift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(4%,-3%) scale(1.08);}}
  @keyframes drift2{0%{transform:translate(0,0) scale(1.05);}100%{transform:translate(-3%,4%) scale(1);}}

  /* faint stars */
  .star{position:fixed;width:2px;height:2px;border-radius:50%;background:var(--moon);z-index:1;
    animation:tw var(--d,5s) ease-in-out infinite;opacity:0;}
  @keyframes tw{0%,100%{opacity:0;}50%{opacity:var(--o,.3);}}

  /* ── stage ── */
  .stage{
    position:relative; z-index:2;
    height:100vh; width:100%; max-width:560px; margin:0 auto;
    display:flex; flex-direction:column;
    padding:0 28px;
  }

  /* moon sigil top */
  .sigil{
    text-align:center; padding-top:48px; flex-shrink:0;
    color:var(--gold); letter-spacing:.5em; font-size:.95rem;
    opacity:.0; animation:fadeSlow 3s ease forwards;
  }
  @keyframes fadeSlow{to{opacity:.55;}}

  /* main viewport where phases render */
  .viewport{
    flex:1; position:relative;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow-y:auto; overflow-x:hidden;
    padding:20px 0;
  }
  .viewport::-webkit-scrollbar{width:0;}
  /* 카드 청함 단계: 문구를 위쪽에 붙여 카드와 겹치지 않게 */
  .viewport.drawmode{ justify-content:flex-start; padding-top:64px; }
  /* 카드 공개 단계: 문구는 위, 카드는 하단부에 크게 (MysticX식) */
  .viewport.cardmode{ justify-content:flex-start; padding-top:6vh; }

  /* forest lines (the spoken text) */
  .forest-text{
    text-align:center;
    font-size:1.15rem;
    line-height:2.4;
    color:var(--text);
    max-width:440px;
    letter-spacing:.02em;
    font-weight:400;
  }
  .forest-text .ln{
    display:block;
    opacity:0;
    filter:blur(8px);
    transform:translateY(6px);
    animation:inkIn 2.6s cubic-bezier(.2,.6,.2,1) forwards;
  }
  @keyframes inkIn{to{opacity:1;filter:blur(0);transform:translateY(0);}}

  .forest-text.reading{
    text-align:left;
    font-size:1.02rem;
    line-height:2.15;
    max-width:460px;
    color:var(--text);
  }
  .forest-text.reading .ln{margin-bottom:1.4em;}

  /* ── card fan (draw_ready) ── */
  .fan{
    position:fixed; left:0; right:0; bottom:0;
    height:62vh; overflow:hidden;
    touch-action:pan-y; cursor:grab; z-index:3;
    outline:none; -webkit-tap-highlight-color:transparent;
    -webkit-user-select:none; user-select:none;
  }
  .fan.dragging{cursor:grabbing;}
  .wheel{ position:absolute; left:50%; bottom:0; transform-origin:bottom center; will-change:transform;
    outline:none; -webkit-tap-highlight-color:transparent; }
  /* 카드 좌표(translate+rotate)는 JS가 계산해 넣는다 */
  .fan .back{
    position:absolute; left:0; top:0;
    width:104px; height:176px; border-radius:11px;
    transform-origin:center;
    background:#fff;
    border:1px solid var(--gold-dim);
    box-shadow:0 10px 26px rgba(0,0,0,.55);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer; will-change:transform;
    transition:transform .34s cubic-bezier(.2,.8,.2,1), box-shadow .3s, border-color .3s;
    overflow:hidden;
    outline:none; -webkit-tap-highlight-color:transparent;
    -webkit-user-select:none; user-select:none;
  }
  .fan .back:focus, .fan .back:active{ outline:none; }
  .fan .back .backimg{ width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
  .fan.busy .back{ transition:box-shadow .3s, border-color .3s; }  /* 드래그/회전 중엔 즉시 반응 */
  .fan .back::after{           /* 카드 안쪽 테두리 문양 */
    content:'';
    position:absolute; inset:8px;
    border:1px solid rgba(201,176,121,.20);
    border-radius:5px;
    background:radial-gradient(circle at 50% 30%, rgba(201,176,121,.10), transparent 62%);
  }
  .fan .back .moon{            /* 중앙 엠블럼(달) */
    width:20px;height:20px;border-radius:50%;
    box-shadow:inset -6px 0 0 0 rgba(201,176,121,.6); opacity:.75; z-index:1;
  }
  /* 손대기 전엔 모두 같은 결 — 가운데 자동 띄우기 없음. 선택한 카드만 떠오름 */
  .fan .back.sel{
    border:2px solid var(--gold);
    box-shadow:0 10px 26px rgba(0,0,0,.5), 0 0 24px rgba(201,176,121,.75);
  }
  .fan .back.sel .moon{ box-shadow:inset -6px 0 0 0 var(--gold); opacity:1; }

  /* 좌우 회전 화살표 */
  .fan-arrow{
    position:fixed; top:64vh; z-index:7;
    width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:rgba(20,28,38,.72); border:1px solid rgba(201,176,121,.35);
    color:var(--gold); font-size:1.3rem; cursor:pointer;
    backdrop-filter:blur(2px);
  }
  .fan-arrow.left{left:12px;} .fan-arrow.right{right:12px;}
  .fan-arrow:active{background:rgba(201,176,121,.25);}

  /* 셔플(다시 섞기) */
  .fan-shuffle{
    position:fixed; top:62px; right:16px; z-index:7;
    display:flex;align-items:center;gap:6px;
    background:rgba(20,28,38,.72); border:1px solid rgba(201,176,121,.35);
    color:var(--gold); font-family:'Nanum Myeongjo',serif; font-size:.82rem;
    padding:8px 14px; border-radius:999px; cursor:pointer; letter-spacing:.03em;
  }
  .fan-shuffle:active{background:rgba(201,176,121,.22);}

  /* 선택 장수 카운터 (문구 바로 아래) */
  .fan-counter{
    margin-top:22px; z-index:7;
    display:flex; align-items:center; gap:10px;
    color:var(--text); font-size:1.0rem; letter-spacing:.04em; white-space:nowrap;
  }
  .fan-counter .num{
    display:inline-flex;align-items:center;justify-content:center;
    width:30px;height:30px;border-radius:50%;
    border:1px solid rgba(201,176,121,.5); color:var(--gold); font-size:.95rem;
  }

  /* 하단 고정 안내/확인 영역 */
  .fan-foot{
    position:fixed; left:0; right:0; bottom:58px; z-index:6;
    display:flex; flex-direction:column; align-items:center; gap:11px;
    pointer-events:none; text-align:center; padding:0 20px;
  }
  .fan-foot .hint2{ font-size:.86rem; color:var(--text-dim); letter-spacing:.05em; }
  .fan-foot .spread-btn{
    pointer-events:auto;
    background:linear-gradient(180deg,#e7d4a0,#cdb47e); color:var(--ink);
    border:none; border-radius:999px; padding:13px 32px; cursor:pointer;
    font-family:'Nanum Myeongjo',serif; font-size:.98rem; letter-spacing:.06em;
    box-shadow:0 0 26px rgba(201,176,121,.45);
  }
  .fan-foot .reselect{ pointer-events:auto; font-size:.76rem; color:var(--text-dim); cursor:pointer; opacity:.85; }

  /* ── revealed cards (card phase) ── */
  .spread{
    display:flex; justify-content:center; gap:18px; flex-wrap:wrap;
    margin:8px 0 4px;
  }
  .card{
    width:96px; text-align:center;
    opacity:0;
    transform:translateY(20px) scale(.9);
    animation:cardRise 1.6s cubic-bezier(.2,.7,.2,1) forwards;
  }
  @keyframes cardRise{to{opacity:1;transform:translateY(0) scale(1);}}
  .card .face{
    width:96px;height:158px;border-radius:7px;
    background:linear-gradient(165deg,#202b36,#141d26);
    border:1px solid var(--gold-dim);
    box-shadow:0 10px 32px rgba(0,0,0,.55), inset 0 0 30px rgba(201,176,121,.04);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    font-size:2rem;
    overflow:hidden;
  }
  .card .face.rev{transform:rotate(180deg);}
  .card .face::before{
    content:'';position:absolute;inset:7px;
    border:1px solid rgba(201,176,121,.2);border-radius:3px;
  }
  .card .glyph{color:var(--gold);opacity:.85;font-size:1.7rem;z-index:1;}
  .card .nm{
    margin-top:12px;font-size:.82rem;color:var(--gold);letter-spacing:.03em;
  }
  .card .pos{
    margin-top:3px;font-size:.68rem;color:var(--text-dim);line-height:1.4;
  }
  .card .ori{
    font-size:.62rem;color:var(--gold-dim);margin-top:2px;
  }

  /* ── 뒤집기(flip) 카드: 뽑은 3장을 직접 터치해 공개 ── */
  .flipspread{ display:flex; justify-content:center; align-items:flex-start; gap:14px; margin-top:24vh;
    width:100%; }
  .flipcell{ display:flex; flex-direction:column; align-items:center; flex:0 0 auto; width:106px; }
  /* 원본 이미지 실제 비율(360x626 = 0.575)에 틀을 정확히 맞춤.
     -> 뒷면(cover)은 잘림 없이 대칭으로 꽉 차고,
        앞면(contain)은 4% 여백 안에서 상하가 좌우보다 살짝 크게 들어간다. */
  .flipcard{ width:106px; aspect-ratio:360/626; perspective:1100px; -webkit-perspective:1100px; cursor:pointer; }
  .flip-inner{ position:relative; width:100%; height:100%;
    transition:transform .85s cubic-bezier(.2,.7,.2,1), -webkit-transform .85s cubic-bezier(.2,.7,.2,1);
    transform-style:preserve-3d; -webkit-transform-style:preserve-3d; }
  .flipcell.flipped .flip-inner{ transform:rotateY(180deg); -webkit-transform:rotateY(180deg); }
  .flip-face{ position:absolute; inset:0; border-radius:10px;
    backface-visibility:hidden; -webkit-backface-visibility:hidden;
    display:flex; align-items:center; justify-content:center; box-shadow:0 12px 30px rgba(0,0,0,.5); overflow:hidden; }
  .flip-face.fback{ background:linear-gradient(160deg,#1c2733,#0f1820); border:1px solid var(--gold-dim); }
  .flip-face.fback .moon{ width:20px;height:20px;border-radius:50%; box-shadow:inset -6px 0 0 0 rgba(201,176,121,.6); opacity:.75; }
  .fbackimg{ width:100%; height:100%; object-fit:cover; display:block; }
  .flip-face.ffront{ transform:rotateY(180deg); -webkit-transform:rotateY(180deg); flex-direction:column;
    background:#f7f4ec; border:1px solid var(--gold); padding:4%; box-sizing:border-box; }
  .ffront .fcontent{ text-align:center; }
  .ffront .fcontent.rev{ transform:rotate(180deg); }   /* 역방향 카드는 앞면 내용이 거꾸로 */
  .ffront .fglyph{ font-size:2.1rem; color:var(--gold); }
  .ffront .fnm{ margin-top:8px; font-size:.94rem; color:var(--moon); }
  .ffront .fori{ margin-top:2px; font-size:.66rem; color:var(--gold-dim); }
  /* 카드 그림은 절대 잘리지 않게 — contain으로 원본을 통째로 보존 */
  .fimg{ width:100%; height:100%; object-fit:contain; display:block; }
  .fimg.rev{ transform:rotate(180deg); }   /* 역방향이면 이미지도 거꾸로 */
  /* 카드 '바깥' 위쪽 — 영문 카드명 */
  .fen{ font-size:.78rem; letter-spacing:.06em; color:var(--gold); text-align:center;
    margin-bottom:9px; opacity:0; transition:opacity .5s .5s; white-space:nowrap; }
  .fen .frev{ margin-top:2px; font-size:.78rem; letter-spacing:.06em; color:var(--gold); }
  .flipcell.flipped .fen{ opacity:1; }
  /* 카드 '바깥' 아래쪽 — 이 리딩에서 이 자리가 갖는 의미 */
  .fpos{ margin-top:10px; width:100%; font-size:.7rem; color:var(--text-dim); line-height:1.55;
    text-align:center; opacity:0; transition:opacity .5s .5s; }
  .flipcell.flipped .fpos{ opacity:1; }
  .flipspread.done .flipcard{ animation:flipGlow 1.5s ease; }
  @keyframes flipGlow{ 50%{ filter:drop-shadow(0 0 16px rgba(201,176,121,.55)); } }
  .fliptip{ margin-top:20px; font-size:.84rem; color:var(--text-dim); letter-spacing:.05em; transition:opacity .4s; }
  .fliptip.hide{ opacity:0; }


  /* ── input zone ── */
  .input-zone{
    flex-shrink:0; padding:18px 0 36px;
    opacity:0; animation:fadeSlow 2s ease forwards; animation-delay:1s;
  }
  .prompt-hint{
    text-align:center;font-size:.82rem;color:var(--text-dim);
    margin-bottom:14px;letter-spacing:.04em;min-height:1em;
  }
  .field{
    display:flex;align-items:center;gap:10px;
    background:rgba(232,228,216,.04);
    border:1px solid rgba(201,176,121,.22);
    border-radius:2px;
    padding:13px 16px;
  }
  .field input{
    flex:1;background:transparent;border:none;outline:none;
    color:var(--text);font-family:'Nanum Myeongjo',serif;font-size:.95rem;
  }
  .field input::placeholder{color:rgba(125,136,145,.55);}
  .send{
    width:34px;height:34px;flex-shrink:0;border:none;cursor:pointer;
    background:transparent;color:var(--gold);font-size:1.1rem;
    transition:opacity .2s;
  }
  .send:hover{opacity:.7;}

  /* control bar for demo */
  .demo-bar{
    position:fixed;bottom:0;left:0;right:0;z-index:50;
    display:flex;justify-content:center;gap:8px;
    padding:10px;background:linear-gradient(transparent,rgba(8,11,15,.9) 40%);
  }
  .demo-bar button{
    background:rgba(201,176,121,.08);
    border:1px solid rgba(201,176,121,.3);
    color:var(--gold);
    font-family:'Nanum Myeongjo',serif;
    font-size:.78rem;
    padding:7px 14px;border-radius:2px;cursor:pointer;
    transition:all .2s;letter-spacing:.03em;
  }
  .demo-bar button:hover{background:rgba(201,176,121,.18);}
  .demo-bar button.active{background:var(--gold);color:var(--ink);}
  .demo-label{ display:none; }

  /* water ripple flash on transition */
  .ripple{
    position:fixed;left:50%;top:45%;z-index:3;
    width:10px;height:10px;border-radius:50%;
    border:1px solid rgba(201,176,121,.5);
    transform:translate(-50%,-50%);pointer-events:none;opacity:0;
  }
  .ripple.go{animation:rip 2.4s ease-out forwards;}
  @keyframes rip{
    0%{opacity:.6;width:10px;height:10px;}
    100%{opacity:0;width:600px;height:600px;}
  }

  /* darkening veil between phases */
  .veil{
    position:fixed;inset:0;z-index:4;background:#080b0f;
    opacity:0;pointer-events:none;
  }
  .veil.flash{animation:veilFlash 1.6s ease;}
  @keyframes veilFlash{0%{opacity:0;}40%{opacity:.7;}100%{opacity:0;}}
</style>
</head>
<body>
<div class="mist-layer"></div>
<div class="mist-layer b"></div>
<div class="ripple" id="ripple"></div>
<div class="veil" id="veil"></div>

<div class="demo-label" id="phaseLabel">welcome</div>

<div class="stage">
  <div class="viewport" id="viewport"></div>
  <div class="input-zone" id="inputZone">
    <div class="prompt-hint" id="hint">무엇이 당신을 이곳으로 데려왔나요</div>
    <div class="field">
      <input id="field" placeholder="가만히, 떠오르는 대로…" />
      <button class="send" id="send">↑</button>
    </div>
  </div>
</div>

<div class="demo-bar" id="demoBar"></div>

      '무엇 때문인지조차 또렷하지 않은 채',
      '마음만 무거운 것 —',
      '어쩌면 그게 가장 지치는 상태일지도 모릅니다.',
      ' ',
      '그 무거움이 주로 어디에서 올라오나요.'
    ]
  },
  {
    phase:'talk',
    hint:'천천히, 당신의 속도로',
    lines:[
      '이제야 그 안개의 한가운데가 보이네요.',
      '“뭘 해도 안 풀린다”던 그 마음이,',
      '사실은 한 사람에게 매여 있었군요.',
      ' ',
      '그 사람과의 지금은, 어떤 자리인가요.'
    ]
  },
  {
    phase:'draw_ready',
    hint:'준비가 되었다면, 카드를 어루만지세요',
    lines:[
      '이제 카드를 펼칠 때가 되었습니다.',
      ' ',
      '마음속으로 그 사람을 한번 떠올려 주세요.',
      '준비되시면, 카드를 어루만지세요.'
    ],
    fan:true
  },
  {
    phase:'card',
    hint:' ',
    lines:[
      '세 장이 당신 앞에 놓였습니다.'
    ],
    cards:[
      {img:'19_sun', nm:'태양', en:'THE SUN', pos:'지금 안고 있는\n마음의 모양', ori:'정방향', rev:false},
      {img:'20_judgment', nm:'심판', en:'JUDGEMENT', pos:'그 사람, 그리고\n남아 있는 것', ori:'역방향', rev:true},
      {img:'21_world', nm:'세계', en:'THE WORLD', pos:'이 미련이\n데려갈 흐름', ori:'정방향', rev:false},
    ]
  },
  {
    phase:'reading',
    hint:' ',
    reading:true,
    lines:[
      '당신이 놓지 못한 건 그 사람이 아니라, 그 사람 곁에 있던 ‘나’였습니다. 황제처럼 단단히 틀어쥔 그 감정의 정체는, 잃어버린 안정된 자신의 감각이었어요.',
      '거꾸로 놓인 컵 6은, 과거에 묶여 있던 시선이 이미 풀려나기 시작했다는 신호입니다. 당신은 생각보다 더 앞으로 나아갈 준비가 되어 있어요.',
      '흐름의 자리에 놓인 컵 10을 보세요. 그 충만함을 누리는 이는 과거로 ‘돌아간’ 사람이 아니라, 새로운 하늘 아래 선 사람입니다. 당신이 그리워하는 그 온도는, 뒤가 아니라 앞에 놓여 있습니다.',
      '오늘 이 자리는 답을 정해주지 않습니다. 다만 막연했던 그 마음에, 이제 이름이 생겼기를. 천천히, 당신의 발밑부터 다시 살펴보시길.'
    ]
  },
];

let idx = 0;
const vp = document.getElementById('viewport');
const hint = document.getElementById('hint');
const label = document.getElementById('phaseLabel');
const inputZone = document.getElementById('inputZone');
const veil = document.getElementById('veil');
const ripple = document.getElementById('ripple');

function clearVp(){ vp.innerHTML=''; }

function renderScene(scene, withTransition=true){
  label.textContent = scene.phase;
  hint.textContent = scene.hint || ' ';

  // input hidden during card/reading
  inputZone.style.visibility = (scene.phase==='draw_ready'||scene.phase==='card'||scene.phase==='reading') ? 'hidden':'visible';
  vp.classList.toggle('drawmode', scene.phase==='draw_ready');
  vp.classList.toggle('cardmode', scene.phase==='card');

  const paint = ()=>{
    clearVp();

    // forest text
    if(scene.lines){
      const wrap = document.createElement('div');
      wrap.className = 'forest-text' + (scene.reading?' reading':'');
      scene.lines.forEach((l,i)=>{
        const span = document.createElement('span');
        span.className='ln';
        span.textContent = l;
        span.style.animationDelay = (scene.reading ? i*1.6 : i*0.9 + 0.3)+'s';
        wrap.appendChild(span);
      });
      vp.appendChild(wrap);
    }

    // card fan — 화면 바닥에 큰 호로 펼쳐지는 카드 (MysticX식 배치/컨트롤)
    if(scene.fan){
      const fan = document.createElement('div');
      fan.className='fan';
      const wheel = document.createElement('div');
      wheel.className='wheel';
      fan.appendChild(wheel);
      vp.appendChild(fan);

      const TOTAL=78;            // 전체 덱
      const CW=104, CH=176;      // 카드 크기 (CSS와 일치)
      const STEP=3.8;            // 카드 간격(도) — 노출 폭을 넓혀 탭이 쉽게
      const LIFT=48;             // 선택 시 떠오르는 거리(px)
      const PICK=3;
      const picked=[];
      let rot=0, lastTick=0;
      const HALF=((TOTAL-1)/2)*STEP;
      const MAXROT=HALF;         // 끝 카드까지 화면 중앙으로 올 수 있게 여유를 충분히
      // 기준 캔버스(REF) — 모바일 한 종류 기준으로 모양을 고정해 두고,
      // 실제 화면(모바일·데스크탑)에는 같은 모양을 통째로 축소/확대만 한다.
      const REF_W=393, REF_H=541;
      let pivotX=REF_W/2, pivotY=0, R=0, FW=0, FH=0;

      const cards=[];
      for(let i=0;i<TOTAL;i++){
        const b=document.createElement('div');
        b.className='back'; b.dataset.i=i;
        b.dataset.ang=(i-(TOTAL-1)/2)*STEP;
        b.innerHTML = CARD_IMG.back
          ? '<img class="backimg" src="'+CARD_IMG.back+'" alt="" draggable="false">'
          : '<span class="moon"></span>';
        b.setAttribute('tabindex','-1');
        b.addEventListener('click',()=>{ if(!moved) toggle(i); });
        wheel.appendChild(b); cards.push(b);
      }
      wheel.style.width = REF_W+'px';
      wheel.style.height = REF_H+'px';

      function layout(){
        FW=fan.clientWidth; FH=fan.clientHeight;
        R = REF_H*1.05;                 // 큰 반지름 → 완만하고 풍성한 호 (기준 좌표계 고정)
        pivotX = REF_W/2;
        pivotY = REF_H*0.52 + R;        // 원 중심을 바닥 아래로 → 카드가 하단을 가득 채우며 솟음
        // 실제 화면 크기에 맞춰 전체를 통째로 축소/확대(모양은 그대로, 크기만 변함)
        const scale = Math.min(FW/REF_W, FH/REF_H);
        wheel.style.transform = `translateX(-50%) scale(${scale})`;
      }
      function render(){
        for(const b of cards){
          const i=parseInt(b.dataset.i,10);
          const a=parseFloat(b.dataset.ang)+rot;
          const rad=a*Math.PI/180;
          const sel=picked.includes(i);
          const cx=pivotX + R*Math.sin(rad);
          const cy=pivotY - R*Math.cos(rad);
          if(sel){
            // 더미에 꽂힌 채 '아주 살짝만' 위로 — 아랫부분은 더미 속에 박혀 틈이 생기지 않게
            const LIFT=24;
            const r=R+LIFT;
            const lx=pivotX + r*Math.sin(rad);
            const ly=pivotY - r*Math.cos(rad);
            b.style.transform=`translate(${lx-CW/2}px, ${ly-CH/2}px) rotate(${a}deg)`;
          } else {
            b.style.transform=`translate(${cx-CW/2}px, ${cy-CH/2}px) rotate(${a}deg)`;
          }
          b.style.zIndex = 100+i;   // 선택해도 더미 쌓임 순서 유지 → 옆 카드가 계속 위를 덮음(더미 속에 박힌 채)
          b.classList.toggle('sel', sel);
        }
      }
      function tick(){
        if(Math.abs(rot-lastTick)>=STEP){ lastTick=rot; if(navigator.vibrate) navigator.vibrate(7); }
      }
      // 부드러운 회전(화살표·셔플용)
      function glide(target){
        target=Math.max(-MAXROT,Math.min(MAXROT,target));
        const start=rot, t0=performance.now(), dur=300;
        fan.classList.add('busy');
        (function step(t){
          const k=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-k,3);
          rot=start+(target-start)*e; render();
          if(k<1) requestAnimationFrame(step); else { rot=target; render(); fan.classList.remove('busy'); }
        })(performance.now());
        if(navigator.vibrate) navigator.vibrate(7);
      }

      // '다시 섞기': 천천히 모였다가 잠시 머문 뒤, 느릿하게 부채로 촤르르 펼친다 (타로답게 차분히)
      function deal(){
        picked.length=0; rot=0; lastTick=0; updateHint();
        if(navigator.vibrate) navigator.vibrate(16);
        const half=(TOTAL-1)/2;
        // 1) 가운데(정점)로 천천히 모음
        for(const b of cards){
          b.classList.remove('sel');
          b.style.zIndex=100+parseInt(b.dataset.i,10);
          b.style.transition='transform .55s ease';
          b.style.transform=`translate(${pivotX-CW/2}px, ${pivotY-R-CH/2}px) rotate(0deg)`;
        }
        // 2) 모인 채 잠시 머문 뒤, 느릿하게 펼침 (왼→오 큰 시차)
        setTimeout(()=>{
          let maxDelay=0;
          for(const b of cards){
            const i=parseInt(b.dataset.i,10);
            const a=(i-half)*STEP, rad=a*Math.PI/180;
            const cx=pivotX+R*Math.sin(rad), cy=pivotY-R*Math.cos(rad);
            const delay=i*9;
            if(delay>maxDelay) maxDelay=delay;
            b.style.transition=`transform 1s cubic-bezier(.22,.61,.36,1) ${delay}ms`;
            b.style.transform=`translate(${cx-CW/2}px, ${cy-CH/2}px) rotate(${a}deg)`;
          }
          // 3) 끝나면 인라인 트랜지션 제거 → 드래그 즉시반응 복구
          setTimeout(()=>{ for(const b of cards) b.style.transition=''; render(); }, maxDelay+1100);
        }, 750);
      }

      // ── 컨트롤: 카운터 / 셔플 / 좌우 화살표 ──
      const counter=document.createElement('div');
      counter.className='fan-counter';
      counter.innerHTML='선택 <span class="num" id="cntNum">0</span> <span style="color:var(--text-dim)">/ '+PICK+' 장</span>';
      vp.appendChild(counter);

      const shuffle=document.createElement('div');
      shuffle.className='fan-shuffle';
      shuffle.innerHTML='&#8635;&nbsp;다시 섞기';
      vp.appendChild(shuffle);
      shuffle.addEventListener('click',()=>{ deal(); });

      const aL=document.createElement('div'); aL.className='fan-arrow left'; aL.textContent='‹';
      const aR=document.createElement('div'); aR.className='fan-arrow right'; aR.textContent='›';
      vp.appendChild(aL); vp.appendChild(aR);
      aL.addEventListener('click',()=> glide(rot + STEP*3));   // 이전(왼쪽) 카드들로
      aR.addEventListener('click',()=> glide(rot - STEP*3));   // 다음(오른쪽) 카드들로

      // ── 하단 안내/확인 ──
      const foot=document.createElement('div');
      foot.className='fan-foot';
      foot.innerHTML='<div class="hint2" id="fanHint">마음이 이끄는 대로, 세 장을 데려오세요</div>'
        +'<button class="spread-btn" id="spreadBtn" style="display:none">세 장을 숲에 펼치다</button>'
        +'<div class="reselect" id="reselectBtn" style="display:none">다시 고르기</div>';
      vp.appendChild(foot);
      foot.querySelector('#spreadBtn').addEventListener('click',()=>go(idx+1));
      foot.querySelector('#reselectBtn').addEventListener('click',()=>{ picked.length=0; render(); updateHint(); });

      function updateHint(){
        const h=foot.querySelector('#fanHint');
        const full=picked.length===PICK;
        document.getElementById('cntNum').textContent=picked.length;
        if(picked.length===0) h.textContent='마음이 이끄는 대로, 세 장을 데려오세요';
        else if(!full) h.textContent=`아직 ${PICK-picked.length}장이 당신을 기다립니다`;
        else h.textContent='세 장이 당신 곁에 머물렀습니다';
        foot.querySelector('#spreadBtn').style.display = full?'block':'none';
        foot.querySelector('#reselectBtn').style.display = full?'block':'none';
      }
      function toggle(i){
        const at=picked.indexOf(i);
        if(at>=0) picked.splice(at,1);
        else if(picked.length<PICK) picked.push(i);
        render(); updateHint();
      }

      // ── drag (pointer + touch) ── 좌우로 쓸어 회전
      let dragging=false, startX=0, startRot=0, moved=false;
      const sens=0.18;
      function down(x){ dragging=true; moved=false; startX=x; startRot=rot; fan.classList.add('dragging'); fan.classList.add('busy'); }
      function move(x){
        if(!dragging) return;
        const dx=x-startX;
        if(Math.abs(dx)>6) moved=true;
        rot=Math.max(-MAXROT, Math.min(MAXROT, startRot+dx*sens));
        render(); tick();
      }
      function up(){ dragging=false; fan.classList.remove('dragging'); fan.classList.remove('busy'); }
      fan.addEventListener('pointerdown',e=>down(e.clientX));
      window.addEventListener('pointermove',e=>move(e.clientX));
      window.addEventListener('pointerup',up);
      fan.addEventListener('touchstart',e=>down(e.touches[0].clientX),{passive:true});
      fan.addEventListener('touchmove',e=>move(e.touches[0].clientX),{passive:true});
      fan.addEventListener('touchend',up);
      window.addEventListener('resize',()=>{ if(document.body.contains(fan)){ layout(); render(); }});

      requestAnimationFrame(()=>{ layout(); render(); });
    }

    // 뽑은 카드를 모아 직접 뒤집기 → 앞면·이름·자리 의미 공개
    if(scene.cards){
      const sp=document.createElement('div');
      sp.className='flipspread';
      let flipped=0;
      const tip=document.createElement('div');
      tip.className='fliptip'; tip.textContent='카드를 하나씩 뒤집어 보세요';
      scene.cards.forEach((c,i)=>{
        const cell=document.createElement('div');
        cell.className='flipcell';
        const frontInner = c.img
          ? '<img class="fimg'+(c.rev?' rev':'')+'" src="'+CARD_IMG[c.img]+'" alt="'+c.nm+'">'
          : '<div class="fcontent'+(c.rev?' rev':'')+'">'
            +'<span class="fglyph">'+c.glyph+'</span>'
            +'<div class="fnm">'+c.nm+'</div>'
            +'<div class="fori">'+c.ori+'</div>'
            +'</div>';
        const backInner = CARD_IMG.back
          ? '<img class="fbackimg" src="'+CARD_IMG.back+'" alt="">'
          : '<span class="moon"></span>';
        cell.innerHTML=
          '<div class="fen">'+(c.en||'')+(c.rev?'<div class="frev">역방향</div>':'')+'</div>'
          +'<div class="flipcard"><div class="flip-inner">'
          +'<div class="flip-face fback">'+backInner+'</div>'
          +'<div class="flip-face ffront">'+frontInner
          +'</div>'
          +'</div></div>'
          +'<div class="fpos">'+c.pos.replace(/\n/g,'<br>')+'</div>';
        cell.querySelector('.flipcard').addEventListener('click',()=>{
          if(cell.classList.contains('flipped')) return;
          cell.classList.add('flipped');
          if(navigator.vibrate) navigator.vibrate(8);
          flipped++;
          if(flipped===scene.cards.length){
            // 3장 모두 공개 → 잠시 빛난 뒤 애니메이션과 함께 리딩으로
            sp.classList.add('done'); tip.classList.add('hide');
            setTimeout(()=>go(idx+1), 1800);
          }
        });
        sp.appendChild(cell);
      });
      vp.appendChild(sp);
      vp.appendChild(tip);
    }
  };

  if(withTransition){
    veil.classList.remove('flash'); void veil.offsetWidth; veil.classList.add('flash');
    ripple.classList.remove('go'); void ripple.offsetWidth; ripple.classList.add('go');
    setTimeout(paint, 560);
  } else {
    paint();
  }
}

function go(n){
  if(n<0||n>=SCENES.length) return;
  idx=n;
  renderScene(SCENES[idx], true);
  updateBar();
}

// demo bar
const bar=document.getElementById('demoBar');
const labels=['시작','대화①','대화②','카드 청함','카드 공개','리딩'];
SCENES.forEach((s,i)=>{
  const btn=document.createElement('button');
  btn.textContent=labels[i];
  btn.onclick=()=>go(i);
  bar.appendChild(btn);
});
function updateBar(){
  [...bar.children].forEach((b,i)=>b.classList.toggle('active',i===idx));
}

// input → advance (simulating user reply)
function advance(){
  document.getElementById('field').value='';
  if(idx < SCENES.length-1) go(idx+1);
}
document.getElementById('send').onclick=advance;
document.getElementById('field').addEventListener('keydown',e=>{if(e.key==='Enter')advance();});

// stars
for(let i=0;i<40;i++){
  const s=document.createElement('div');s.className='star';
  s.style.left=Math.random()*100+'%';s.style.top=Math.random()*60+'%';
  s.style.setProperty('--d',(Math.random()*4+3)+'s');
  s.style.setProperty('--o',(Math.random()*.35+.1));
  s.style.animationDelay=Math.random()*5+'s';
  document.body.appendChild(s);
}

// init
renderScene(SCENES[0], false);
updateBar();
</script>
